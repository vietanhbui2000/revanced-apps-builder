parallel-jobs = 1

cli-source = "revanced/revanced-cli"
patches-source = "revanced/revanced-patches"
integrations-source = "revanced/revanced-integrations"

cli-version = "latest"
patches-version = "latest"

[YouTube]
enabled = true
build-mode = "apk"
version = "auto"
arch = "all"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
# cli-version = "latest"
# patches-version = "v5.9.0"
included-patches = "'Bypass image region restrictions' 'Bypass URL redirects' 'Change form factor' 'Change start page' 'Disable auto captions' 'Disable player popup panels' 'Disable precise seeking gesture' 'Disable resuming Shorts on startup' 'Disable rolling number animations' 'Disable zoom haptics' 'Enable slide to seek' 'Force original audio' 'GmsCore support' 'Hide ads' 'Hide end screen suggested video' 'Hide endscreen cards' 'Hide info cards' 'Hide layout components' 'Hide player overlay buttons' 'Hide seekbar' 'Hide Shorts components' 'Hide timestamp' 'Hide video action buttons' 'Miniplayer' 'Navigation buttons' 'Open links externally' 'Remember video quality' 'Remove background playback restrictions' 'Remove player controls background' 'Remove tracking query parameter' 'Remove viewer discretion dialog' 'Restore old video quality menu' 'Return YouTube Dislike' 'Seekbar tapping' 'Seekbar thumbnails' 'SponsorBlock' 'Spoof app version' 'Spoof device dimensions' 'Spoof video streams' 'Video ads'"
excluded-patches = "'Alternative thumbnails' 'Always repeat' 'Announcements' 'Change header' 'Check watch history domain name resolution' 'Copy video URL' 'Custom branding' 'Custom player overlay opacity' 'Disable fullscreen ambient mode' 'Disable HDR video' 'Downloads' 'Enable debugging' 'Exit fullscreen mode' 'Open Shorts in regular player' 'Open videos fullscreen' 'Playback speed' 'Shorts autoplay' 'Swipe controls' 'Wide searchbar'"
patcher-args = "-OgmsCoreVendorGroupId=app.revanced "

[YouTube-Music]
enabled = true
build-mode = "apk"
version = "auto"
arch = "both"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
# cli-version = "latest"
# patches-version = "v5.9.0"
included-patches = "'Bypass certificate checks' 'Enable exclusive audio playback' 'GmsCore support' 'Hide 'Get Music Premium' label' 'Hide music video ads' 'Remove background playback restrictions' 'Remove upgrade button' 'Spoof client'"
excluded-patches = "'Hide category bar' 'Permanent repeat'"
patcher-args = "-OgmsCoreVendorGroupId=app.revanced "

[TikTok]
enabled = true
build-mode = "apk"
version = "auto"
arch = "all"
# apkmirror-dlurl = "https://apkmirror.com/apk/tiktok-pte-ltd/tik-tok"
uptodown-dlurl = "https://tik-tok.en.uptodown.com/android"
# cli-version = "latest"
# patches-version = "v5.7.2"
included-patches = "'Feed filter' 'Remember clear display' 'Downloads' 'Show seekbar' 'Playback speed' 'Disable login requirement' 'Fix Google login' 'Settings' 'SIM spoof'"
exclusive-patches = true

